# Personal Hyprland bindings.
#
# Omarchy's hyprland.conf sources `default/hypr/bindings/*.conf` (menus, media,
# tiling, etc.) but NOT the app-launcher set. Omarchy installs that set to
# ~/.config/hypr/bindings.conf from its template at config/hypr/bindings.conf
# and considers the copy yours to modify. Since tailor overwrites
# ~/.config/hypr/bindings.conf on every run, we source the upstream template
# directly so Omarchy updates to the app-launcher set still flow through;
# personal overrides are layered below.

source = ~/.local/share/omarchy/config/hypr/bindings.conf

# Override default Super+Shift+A (ChatGPT) to launch the user's WebUI
unbind = SUPER SHIFT, A
bind   = SUPER SHIFT, A, exec, omarchy-launch-webapp "$webui_url"

# Launchpad (37signals)
bind = SUPER SHIFT, S, exec, omarchy-launch-webapp "https://launchpad.37signals.com/"

# Gaming mode toggle — start/stop kanata homerow-mods service
bindd = SUPER, F12, Gaming mode toggle, exec, ~/.local/bin/kanata-gaming-toggle

# Voxtype dictation (push-to-talk on F5)
bindd  = , F5, Start dictation, exec, voxtype record start
binddr = , F5, Stop dictation,  exec, voxtype record stop
