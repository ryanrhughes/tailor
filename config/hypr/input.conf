# Personal Hyprland input overrides.
# Sourced after ~/.local/share/omarchy/default/hypr/input.conf — additions only.

input {
  touchpad {
    # Two-finger click for right-click instead of bottom-right corner
    clickfinger_behavior = true
    # Slow down touchpad scrolling
    scroll_factor = 0.4
  }
}

gestures {
  workspace_swipe_touch = true
}

# Per-app touchpad scroll multipliers
windowrule {
  name = scrolltouchpad-fast
  scroll_touchpad = 1.5
  match:class = (Alacritty|kitty)
}

windowrule {
  name = scrolltouchpad-slow
  scroll_touchpad = 0.2
  match:class = com.mitchellh.ghostty
}
